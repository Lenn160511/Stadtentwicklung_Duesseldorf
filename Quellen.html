<script>
const menu = document.getElementById("svgMenu");
const btn = document.getElementById("menuBtn");

// Menü öffnen/schließen
btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");

    if (menu.classList.contains("hidden")) {
        btn.style.display = "block";   // Menü zu → Button sichtbar
    } else {
        btn.style.display = "none";    // Menü offen → Button unsichtbar
    }
});

// Menü schließen, wenn ein Menüpunkt angeklickt wird
document.querySelectorAll("#svgMenu a").forEach(link => {
    link.addEventListener("click", () => {
        menu.classList.add("hidden");  // Menü schließen
        btn.style.display = "block";   // Button wieder anzeigen
    });
});


</script>
